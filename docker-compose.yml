version: '3.9'

services:
  app:
    build: .
    container_name: nest_app

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - postgres

    restart: always

  postgres:
    image: postgres:16

    container_name: postgres_db

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

volumes:
  postgres_data:
